name: Update manifest hashes

on:
  push:
    branches: [main]
    paths:
      - "translations/**"
      - "!translations/manifest/**"

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Recompute manifest hashes
        run: python tools/update_manifest.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet translations/manifest/en.json || \
            (git add translations/manifest/en.json && \
             git commit -m "Update manifest hashes" && \
             git push)
